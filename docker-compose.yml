version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alhabeed
      POSTGRES_PASSWORD: alhabeed
      POSTGRES_DB: alhabeed
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alhabeed"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: dev-secret-key
      DEBUG: "True"
      DATABASE_URL: postgres://alhabeed:alhabeed@postgres:5432/alhabeed
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      JWT_SECRET: dev-jwt-secret
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  scheduler:
    build: ./backend
    entrypoint: ["/scheduler-entrypoint.sh"]
    environment:
      SECRET_KEY: dev-secret-key
      DEBUG: "True"
      DATABASE_URL: postgres://alhabeed:alhabeed@postgres:5432/alhabeed
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      JWT_SECRET: dev-jwt-secret
      FOOTBALL_DATA_API_TOKEN: ${FOOTBALL_DATA_API_TOKEN:-}
      FOOTBALL_DATA_COMPETITION_CODE: ${FOOTBALL_DATA_COMPETITION_CODE:-WC}
      LIVE_SCORE_SYNC_START: ${LIVE_SCORE_SYNC_START:-2026-06-11}
      LIVE_SCORE_SYNC_END: ${LIVE_SCORE_SYNC_END:-2026-07-19}
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
  frontend_node_modules:
