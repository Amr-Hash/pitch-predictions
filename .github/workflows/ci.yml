name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_4Xmlf7t3YpurUX6c1nZH0ra0
  VERCEL_FRONTEND_PROJECT_ID: prj_uvzwNOMdzKBrd2IsQ0MCrQUtHc5K
  VERCEL_BACKEND_PROJECT_ID: prj_FRxuskySw6XocyTyrftLpgZw2baf

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: alhabeed
          POSTGRES_PASSWORD: alhabeed
          POSTGRES_DB: alhabeed
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgres://alhabeed:alhabeed@localhost:5432/alhabeed
          SECRET_KEY: test-secret
          JWT_SECRET: test-jwt
        run: python manage.py migrate --noinput

      - name: Run tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: postgres://alhabeed:alhabeed@localhost:5432/alhabeed
          SECRET_KEY: test-secret
          JWT_SECRET: test-jwt
        run: |
          coverage run manage.py test --settings=worldcup.test_settings -v 2
          coverage report --fail-under=80

      - name: Build Docker image
        run: docker build -t alhabeed-backend ./backend

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        env:
          BACKEND_URL: http://localhost:8000
          NEXT_PUBLIC_API_URL: ""
        run: npm run build

      - name: Build Docker image
        run: docker build -f frontend/Dockerfile.dev -t alhabeed-frontend ./frontend

  deploy-backend:
    name: Deploy backend to Vercel
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    concurrency:
      group: deploy-backend-production
      cancel-in-progress: true
    environment:
      name: production-backend
      url: https://alhabeed-api.vercel.app

    steps:
      - uses: actions/checkout@v4

      - name: Deploy Django API and update live alias
        working-directory: backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_BACKEND_PROJECT_ID }}
          PRODUCTION_ALIAS: alhabeed-api.vercel.app
        run: bash ../.github/scripts/vercel-deploy.sh

  deploy-frontend:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, deploy-backend]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    concurrency:
      group: deploy-frontend-production
      cancel-in-progress: true
    environment:
      name: production-frontend
      url: https://alhabeed.vercel.app

    steps:
      - uses: actions/checkout@v4

      - name: Deploy Next.js app and update live alias
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_FRONTEND_PROJECT_ID }}
          PRODUCTION_ALIAS: alhabeed.vercel.app
        run: bash ../.github/scripts/vercel-deploy.sh
