name: Setup Football Data API

on:
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_4Xmlf7t3YpurUX6c1nZH0ra0
  VERCEL_BACKEND_PROJECT_ID: prj_FRxuskySw6XocyTyrftLpgZw2baf

jobs:
  setup-football-data:
    name: Configure football-data.org on Vercel
    runs-on: ubuntu-latest
    environment:
      name: production-backend
      url: https://alhabeed-api.vercel.app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Vercel token
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_TEAM_SLUG: amr-hashem
        run: bash .github/scripts/vercel-validate-token.sh

      - name: Ensure CRON_SECRET on Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ENSURE_CRON_SECRET: "1"
        run: node scripts/cron/set-cron-secret-vercel.mjs

      - name: Set football-data env vars and redeploy API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}
        run: node scripts/set-football-data-vercel.mjs

      - name: Verify API redeploy
        run: |
          for i in $(seq 1 12); do
            if curl -fsS "https://alhabeed-api.vercel.app/api/health" >/dev/null; then
              echo "API health check passed after redeploy."
              echo "Ensure CRON_SECRET is set on Vercel and cron jobs are defined in backend/vercel.json."
              exit 0
            fi
            echo "Waiting for production redeploy (attempt ${i}/12)..."
            sleep 15
          done
          echo "Production may still be redeploying; check https://alhabeed-api.vercel.app/api/health"
