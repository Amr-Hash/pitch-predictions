name: Live Score Sync

# Scrapes public score pages for tournaments set to "scraping" provider.
# Runs every 15 minutes during the tournament window. Requires CRON_SECRET in repo secrets.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger live score sync
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::warning::CRON_SECRET is not set; skipping live score sync."
            exit 0
          fi
          curl -sf -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://alhabeed-api.vercel.app/api/cron/sync-live-scores"
