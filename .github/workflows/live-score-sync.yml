name: Live Score Sync

# Vercel Hobby allows at most one cron per day; use GitHub Actions to poll every 5 minutes.
# Set CRON_SECRET in repo secrets (same value as alhabeed-api on Vercel).
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger live score sync
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::warning::CRON_SECRET is not set; skipping live score sync."
            exit 0
          fi
          curl -sf -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://alhabeed-api.vercel.app/api/cron/sync-live-scores"
