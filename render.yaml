# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Production API runs on Vercel (alhabeed-api.vercel.app).
# Deploy the alhabeed-scheduler worker to run live score sync + kickoff reminders.
#
# After connecting this blueprint, set DATABASE_URL and FOOTBALL_DATA_API_TOKEN
# on alhabeed-scheduler (same values as the Vercel API project).

envVarGroups:
  - name: alhabeed-scheduler-env
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1
      - key: CORS_ALLOWED_ORIGINS
        value: https://alhabeed.vercel.app
      - key: FRONTEND_URL
        value: https://alhabeed.vercel.app
      - key: FOOTBALL_DATA_COMPETITION_CODE
        value: WC
      - key: LIVE_SCORE_SYNC_START
        value: "2026-06-11"
      - key: LIVE_SCORE_SYNC_END
        value: "2026-07-19"
      - key: VAPID_ADMIN_EMAIL
        value: noreply@alhabeed.com
      # Required — copy from Vercel / Neon (see docs/render-scheduler.md)
      - key: DATABASE_URL
        sync: false
      - key: FOOTBALL_DATA_API_TOKEN
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false

services:
  # Optional alternative to Vercel API — disable in Render if you only use alhabeed-api.vercel.app
  - type: web
    name: alhabeed-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://alhabeed.vercel.app
    preDeployCommand: python manage.py migrate --noinput

  # Always-on scheduler: runs backend/cron/crontab (15 min live scores, 5 min reminders)
  - type: worker
    name: alhabeed-scheduler
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: /scheduler-entrypoint.sh
    plan: starter
    autoDeployTrigger: commit
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - fromGroup: alhabeed-scheduler-env
